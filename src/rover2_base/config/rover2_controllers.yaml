# ros2_control configuration for Viam Rover 2

controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    # Controller types
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


diff_drive_controller:
  ros__parameters:
    # Wheel joint names (must match URDF)
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    # Wheel parameters (from Viam Rover 2 spec)
    wheel_separation: 0.356       # 356 mm
    wheel_radius: 0.06065         # 60.65 mm (121.3mm diameter / 2)

    # Multipliers for calibration (default 1.0)
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    # Odometry configuration
    publish_rate: 50.0            # Hz
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    # TF publishing
    enable_odom_tf: true

    # Velocity/acceleration limits
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.has_jerk_limits: false
    linear.x.max_velocity: 0.76           # m/s (~120 RPM at wheel)
    linear.x.min_velocity: -0.76
    linear.x.max_acceleration: 1.0        # m/s^2
    linear.x.min_acceleration: -1.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 2.0           # rad/s
    angular.z.min_velocity: -2.0
    angular.z.max_acceleration: 3.0       # rad/s^2
    angular.z.min_acceleration: -3.0

    # Command timeout
    cmd_vel_timeout: 0.5  # seconds

    # Feedback configuration
    position_feedback: true
    open_loop: false


joint_state_broadcaster:
  ros__parameters:
    # No special configuration needed
    # Publishes all joint states
