# Sensor configuration for Rover2

ina219_node:
  ros__parameters:
    # I2C settings
    i2c_bus: 1
    i2c_address: 0x40  # 64 in decimal

    # Publishing rate (Hz)
    publish_rate: 10.0

    # Shunt resistor value (ohms)
    shunt_resistance: 0.1

    # Battery voltage thresholds (4S LiPo)
    low_voltage_threshold: 13.0      # Warning level
    critical_voltage_threshold: 12.0  # Critical level - stop using!

# Note: For MPU6050 IMU, use ros2_mpu6050_driver package
# Clone from: https://github.com/hiwad-aziz/ros2_mpu6050_driver
